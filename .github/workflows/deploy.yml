name: Deploy to AWS Lambda

on:
  push:
    branches: [master]
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab too

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy
        # deploy.sh replaces the Lambda's ENTIRE environment on every run
        # (update-function-configuration is not additive), so every var the
        # function needs at runtime must be passed here — omitting one silently
        # drops it from production. SESSION_SECRET must be a STABLE value (a
        # rotation logs everyone out); GOOGLE_CLIENT_ID missing breaks sign-in.
        # AUTH_DEV_FAKE is deliberately never set here — it's a dev-only bypass.
        env:
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          chmod +x aws/deploy.sh
          ./aws/deploy.sh
